<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Library Management System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
}

/* Navbar */

.navbar{
    display:flex;
    justify-content:space-between;
    padding:20px 40px;
    background:rgba(0,0,0,0.2);
}

.logo{
    font-size:24px;
    font-weight:bold;
}

.nav-links a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    font-size:18px;
}

.container{
    padding:40px;
}

</style>

</head>

<body>

<div class="navbar">

<div class="logo">📚 My Library</div>

<div class="nav-links">

<a href="/">Home</a>

<a href="{{ url_for('student.register_student')}}">Students</a>

<a href="{{ url_for('book.book_register')}}">Books</a>

<a href="{{ url_for('author.author_register')}}">Authors</a>

</div>

</div>

<div class="container">

{% block content %}

{% endblock %}

</div>

</body>
</html>
