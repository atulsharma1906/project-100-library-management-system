<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Library Management System</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
}

/* Navbar */

.navbar{
    display:flex;
    justify-content:space-between;
    padding:20px 40px;
    background:rgba(0,0,0,0.2);
}

.logo{
    font-size:24px;
    font-weight:bold;
}

.nav-links a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    font-size:18px;
}

/* Hero Section */

.hero{
    height:80vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1{
    font-size:55px;
}

.hero p{
    font-size:20px;
    margin-top:10px;
}

/* Buttons */

.buttons{
    margin-top:30px;
}

.btn{
    padding:12px 25px;
    margin:10px;
    border:none;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
    text-decoration:none;
    color:white;
}

.student{
    background:#1abc9c;
}

.book{
    background:#3498db;
}

.author{
    background:#e67e22;
}

.btn:hover{
    transform:scale(1.1);
}

/* Footer */

footer{
    text-align:center;
    padding:15px;
    background:rgba(0,0,0,0.3);
}

</style>

</head>

<body>

<div class="navbar">
<div class="logo">📚 My Library</div>

<div class="nav-links">
<a href="/">Home</a>
<a href="{{ url_for('student.register_student')}}">Students</a>
<a href="{{url_for('book.book_register')}}">Books</a>
<a href="{{ url_for('author.author_register') }}">Author Page</a>
</div>
</div>

<div class="hero">

<h1>Library Management System</h1>
<p>Manage Students, Books and Authors Easily</p>

<div class="buttons">

<a href="/student" class="btn student">👨‍🎓 Manage Students</a>

<a href="/book" class="btn book">📖 Manage Books</a>

<a href="/author" class="btn author">✍ Manage Authors</a>

</div>

</div>

<footer>
<p>Aturun Library</p>
</footer>

</body>
</html>
