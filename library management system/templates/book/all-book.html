{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

<div class="card p-4 shadow">

<h3 class="text-center mb-4">📚 All Books</h3>

<table class="table table-bordered table-striped">

<tr>
<th>ID</th>
<th>Title</th>
<th>Author</th>
<th>ISBN</th>
<th>Publisher</th>
<th>Year</th>
<th>Action</th>
</tr>

{% for book in books %}

<tr>

<td>{{ book.id }}</td>
<td>{{ book.book_title }}</td>
<td>{{ book.author_name }}</td>
<td>{{ book.isbn }}</td>
<td>{{ book.publisher }}</td>
<td>{{ book.year }}</td>

<td>

<a href="{{ url_for('book.book_details', id=book.id) }}">
<button class="btn btn-success btn-sm">Read</button>
</a>

<a href="{{ url_for('book.edit_book', id=book.id) }}">
<button class="btn btn-warning btn-sm">Edit</button>
</a>

<a href="{{ url_for('book.delete_book', id=book.id) }}">
<button class="btn btn-danger btn-sm">Delete</button>
</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</div>

{% endblock %}
