{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-5">

<div class="card shadow-lg p-4">

<h3 class="text-center mb-4 text-dark">✍ Author Registration</h3>

<form method="POST">

<div class="mb-3">
<label class="form-label text-dark">Author Name</label>
<input type="text" class="form-control" name="name" placeholder="Enter author name">
</div>

<div class="mb-3">
<label class="form-label text-dark">Email</label>
<input type="email" class="form-control" name="email" placeholder="Enter email">
</div>

<div class="mb-3">
<label class="form-label text-dark">Phone</label>
<input type="text" class="form-control" name="phone" placeholder="Enter phone number">
</div>

<div class="mb-3">
<label class="form-label text-dark">Country</label>
<input type="text" class="form-control" name="country" placeholder="Enter country">
</div>

<div class="mb-3">
<label class="form-label text-dark">Biography</label>
<textarea class="form-control" name="bio" rows="3"></textarea>
</div>

<div class="d-grid">
<button class="btn btn-success">Register Author</button>
</div>

</form>

</div>

</div>

</div>

</div>

{% endblock %}
