<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#141e30,#243b55);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-card{
width:350px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
color:white;
}

.login-card h2{
text-align:center;
margin-bottom:25px;
}

.form-control{
width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:6px;
outline:none;
}

.login-btn{
width:100%;
padding:12px;
background:#1abc9c;
border:none;
border-radius:6px;
color:white;
font-size:16px;
cursor:pointer;
}

.login-btn:hover{
background:#16a085;
}

</style>

</head>

<body>

<div class="login-card">

<h2>Student Login</h2>

<form method="POST" action="/login">

<input type="email" name="email" placeholder="Enter Email" class="form-control" required>

<input type="password" name="password" placeholder="Enter Password" class="form-control" required>

<button type="submit" class="login-btn">Login</button>

</form>

</div>

</body>
</html>
